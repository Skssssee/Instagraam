<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizofy TV - Live Sports</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@silvermine/videojs-quality-selector/dist/css/quality-selector.css" rel="stylesheet">

    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; padding-bottom: 50px; }

        /* Header Styles */
        .header {
            background: white; padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd;
        }
        .header .logo { color: #2b59ff; font-size: 32px; font-weight: 900; }
        .menu-icon, .theme-icon { background: #3b5998; color: white; padding: 8px; border-radius: 8px; font-size: 20px; }

        .subtitle-box {
            background: #2b59ff; color: white; text-align: center;
            width: fit-content; margin: 5px auto; padding: 5px 20px;
            border-radius: 5px; font-weight: bold; font-size: 18px;
        }

        .nav-buttons { display: flex; justify-content: space-around; padding: 15px 10px; gap: 10px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
        .btn-blue { background: #3b5998; opacity: 0.8; }
        .btn-dark { background: #333; }

        .schedule-bar { background: red; color: white; text-align: center; padding: 8px; font-weight: bold; font-size: 18px; text-transform: uppercase; }

        /* IPL Card */
        .match-card {
            background: white; margin: 15px; border: 2px solid #000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border-radius: 5px; cursor: pointer;
        }
        .match-name { font-size: 22px; font-weight: bold; color: #333; }
        .live-icon { text-align: center; font-size: 12px; font-weight: bold; color: red; }

        /* MODAL PLAYER */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.98);
            justify-content: center; align-items: center;
        }
        .modal-content {
            position: relative; width: 100%; max-width: 900px;
            background: #000; border: 1px solid #444;
        }
        
        /* LOGO HIDER OVERLAY */
        .logo-hider {
            position: absolute; top: 10px; right: 10px;
            background: #2b59ff; color: white; padding: 6px 14px;
            font-weight: bold; font-size: 14px; z-index: 100;
            border-radius: 4px; pointer-events: none;
        }

        .close-btn {
            position: absolute; top: -50px; right: 10px; color: white;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001;
        }

        /* Video.js Customization */
        .video-js { width: 100%; aspect-ratio: 16/9; }
        .vjs-big-play-button { top: 50% !important; left: 50% !important; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-icon">☰</div>
        <div class="logo">Mizofy TV</div>
        <div class="theme-icon">🌙</div>
    </div>

    <div class="subtitle-box">Live Sports & Update</div>

    <div class="nav-buttons">
        <button class="nav-btn btn-blue">••••</button>
        <button class="nav-btn btn-dark">Today Live</button>
        <button class="nav-btn btn-blue">••••</button>
    </div>

    <div class="schedule-bar">ALL Schedule</div>

    <div class="match-card" onclick="openPlayer()">
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 30px;">🏏</span>
            <span class="match-name">IPL 2026</span>
        </div>
        <div class="live-icon">
            <span style="font-size: 24px;">📍</span><br>LIVE
        </div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <div class="logo-hider">Mizofy TV</div>
            
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'>
                <p class="vjs-no-js">To view this video please enable JavaScript, and consider upgrading to a web browser that supports HTML5 video</p>
            </video>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/@silvermine/videojs-quality-selector/dist/js/quality-selector.min.js"></script>

    <script>
        const modal = document.getElementById('playerModal');
        let player;

        // The M3U8 Stream URL
        const streamUrl = "https://amg01269-amg01269c1-distrotv-us-5379.playouts.now.amagi.tv/playlist/amg01269-willowtvfast-willowplus-distrotvus/playlist.m3u8";

        function openPlayer() {
            modal.style.display = "flex";

            // Initialize Player if not already done
            if (!player) {
                player = videojs('my-video', {
                    autoplay: true,
                    fluid: true,
                    controlBar: {
                        children: [
                            'playToggle',
                            'volumePanel',
                            'currentTimeDisplay',
                            'timeDivider',
                            'durationDisplay',
                            'progressControl',
                            'liveDisplay',
                            'remainingTimeDisplay',
                            'customControlSpacer',
                            'playbackRateMenuButton',
                            'chaptersButton',
                            'descriptionsButton',
                            'subsCapsButton',
                            'audioTrackButton',
                            'fullscreenToggle',
                        ],
                    },
                });
                
                // Add Quality Selector (The gear icon)
                player.controlBar.addChild('QualitySelector');
            }

            player.src({
                src: streamUrl,
                type: 'application/x-mpegURL'
            });
            player.play();
        }

        function closePlayer() {
            modal.style.display = "none";
            if (player) {
                player.pause();
                player.src(""); // Stops loading data
            }
        }
    </script>

</body>
</html>
