<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizofy TV - Live Sports</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        body { background-color: #f0f2f5; padding-bottom: 50px; }

        /* Header Styles */
        .header {
            background: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
        }
        .header .logo { color: #2b59ff; font-size: 32px; font-weight: 900; }
        .menu-icon, .theme-icon {
            background: #3b5998; color: white; padding: 8px; border-radius: 8px; font-size: 20px;
        }

        /* Subtitle */
        .subtitle-box {
            background: #2b59ff; color: white; text-align: center;
            width: fit-content; margin: 5px auto; padding: 5px 20px;
            border-radius: 5px; font-weight: bold; font-size: 18px;
        }

        /* Nav Buttons */
        .nav-buttons { display: flex; justify-content: space-around; padding: 15px 10px; gap: 10px; }
        .nav-btn {
            flex: 1; padding: 12px; border-radius: 8px; border: none;
            font-weight: bold; font-size: 16px; color: white; cursor: pointer;
        }
        .btn-blue { background: #3b5998; opacity: 0.8; }
        .btn-dark { background: #333; }

        /* Schedule Bar */
        .schedule-bar {
            background: red; color: white; text-align: center;
            padding: 8px; font-weight: bold; font-size: 18px; text-transform: uppercase;
        }

        /* IPL Card */
        .match-card {
            background: white; margin: 15px; border: 2px solid #000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border-radius: 5px; cursor: pointer;
        }
        .match-info { display: flex; align-items: center; gap: 15px; }
        .match-name { font-size: 22px; font-weight: bold; color: #333; }
        .live-icon { text-align: center; font-size: 12px; font-weight: bold; color: red; }

        /* Telegram Section */
        .telegram-section { text-align: center; margin-top: 30px; }
        .tg-link {
            display: inline-block; background: #0088cc; color: white;
            text-decoration: none; padding: 12px 25px; border-radius: 30px;
            font-weight: bold; font-size: 18px; margin-top: 10px;
        }

        /* MODAL PLAYER */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.98);
            justify-content: center; align-items: center;
        }
        .modal-content {
            position: relative; width: 100%; max-width: 900px; aspect-ratio: 16/9;
            background: #000; border: 1px solid #444;
        }
        .close-btn {
            position: absolute; top: -50px; right: 10px; color: white;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-icon">☰</div>
        <div class="logo">Mizofy TV</div>
        <div class="theme-icon">🌙</div>
    </div>

    <div class="subtitle-box">Live Sports & Update</div>

    <div class="nav-buttons">
        <button class="nav-btn btn-blue">••••</button>
        <button class="nav-btn btn-dark">Today Live</button>
        <button class="nav-btn btn-blue">••••</button>
    </div>

    <div class="schedule-bar">ALL Schedule</div>

    <div class="match-card" onclick="openPlayer()">
        <div class="match-info">
            <span style="font-size: 30px;">🏏</span>
            <span class="match-name">IPL 2026</span>
        </div>
        <div class="live-icon">
            <span style="font-size: 24px;">📍</span><br>LIVE
        </div>
    </div>

    <div class="telegram-section">
        <h3>More Updates Here</h3>
        <a href="https://t.me/+r_2nbarfWuVmYzU9" class="tg-link" target="_blank">Join Telegram</a>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <iframe id="nimoIframe" src="" 
                allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share; fullscreen" 
                allowfullscreen="true" 
                webkitallowfullscreen="true" 
                mozallowfullscreen="true">
            </iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const iframe = document.getElementById('nimoIframe');
        const videoUrl = "https://www.nimo.tv/embed/4049058852";

        function openPlayer() {
            modal.style.display = "flex";
            iframe.src = videoUrl;
        }

        function closePlayer() {
            modal.style.display = "none";
            iframe.src = "";
        }
        
        // No side-click exit logic here.
    </script>

</body>
</html>
