<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimo TV Pop-up Player</title>
    <style>
        /* Body setup to center the button */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        /* Main Button */
        .open-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ff4500;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Pop-up (Modal) background */
        .modal {
            display: none; /* Default hidden */
            position: fixed; 
            z-index: 999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            justify-content: center;
            align-items: center;
        }

        /* Player Container */
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <button class="open-btn" onclick="openPlayer()">Watch Live Stream</button>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <iframe id="nimoIframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const iframe = document.getElementById('nimoIframe');
        const videoUrl = "https://www.nimo.tv/embed/1913320824";

        function openPlayer() {
            modal.style.display = "flex";
            iframe.src = videoUrl; // Load video only when opened
        }

        function closePlayer() {
            modal.style.display = "none";
            iframe.src = ""; // Stop video playback on close
        }

        // Close if user clicks outside the video box
        window.onclick = function(event) {
            if (event.target == modal) {
                closePlayer();
            }
        }
    </script>

</body>
  </html>
