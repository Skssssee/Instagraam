        /* Header Styles */
        .header {

        /* Schedule Bar */

            background: red; color: white; text-align: center;
            padding: 8px; font-weight: bold; font-size: 18px; text-transform: uppercase;
        }

        /* IPL Card */
        .match-card {
            background: white; margin: 15px; border: 2px solid #000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; border-radius: 5px; cursor: pointer;

        .match-info { display: flex; align-items: center; gap: 15px; }
        .match-name { font-size: 22px; font-weight: bold; color: #333; }
        .live-icon { text-align: center; font-size: 12px; font-weight: bold; color: red; }

        /* Telegram Section */

            text-decoration: none; padding: 12px 25px; border-radius: 30px;

        /* MODAL PLAYER */
        .modal {

            width: 100%; height: 100%; background-color: rgba(0,0,0,0.98);

        .modal-content {

        }
        .close-btn {

        iframe { width: 100%; height: 100%; border: none; }
