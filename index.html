<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSave - Pro YT Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white font-sans">

    <nav class="p-5 border-b border-gray-800 bg-gray-900 shadow-xl">
        <div class="container mx-auto">
            <h1 class="text-3xl font-black text-red-500 tracking-tighter">
                <i class="fab fa-youtube mr-2"></i>STREAMSAVE
            </h1>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold mb-4">Download Video & Audio</h2>
            <p class="text-gray-400">Enter the link of the video you want to download below.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-3 mb-10">
            <input id="videoInput" type="text" placeholder="https://www.youtube.com/watch?v=..." 
                   class="flex-1 p-4 rounded-xl bg-gray-800 border-2 border-gray-700 focus:border-red-500 outline-none transition">
            <button onclick="handleDownload()" id="btnText" class="bg-red-600 hover:bg-red-700 px-10 py-4 rounded-xl font-bold transition flex items-center justify-center">
                <span>Fetch Links</span>
            </button>
        </div>

        <div id="loader" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-500 mx-auto mb-4"></div>
            <p class="text-red-500 font-medium">Analyzing video link...</p>
        </div>

        <div id="resultCard" class="hidden bg-gray-900 border border-gray-800 rounded-3xl overflow-hidden shadow-2xl animate-in fade-in duration-500">
            <div class="md:flex">
                <div class="md:w-2/5 p-6 bg-gray-800">
                    <img id="thumb" src="" class="rounded-xl w-full shadow-lg mb-4" alt="Thumbnail">
                    <h3 id="title" class="text-lg font-bold leading-tight mb-2"></h3>
                    <span id="duration" class="text-xs uppercase bg-gray-700 px-2 py-1 rounded text-gray-300"></span>
                </div>
                
                <div class="md:w-3/5 p-6">
                    <h4 class="text-sm font-bold text-gray-500 uppercase mb-4 tracking-widest">Available Formats</h4>
                    <div id="formatGrid" class="space-y-3 overflow-y-auto max-h-[400px] pr-2">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function handleDownload() {
            const input = document.getElementById('videoInput');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            const formatGrid = document.getElementById('formatGrid');

            if (!input.value) return alert("Please paste a valid URL");

            // UI Reset
            loader.classList.remove('hidden');
            resultCard.classList.add('hidden');
            formatGrid.innerHTML = '';

            try {
                // We encode the URL to prevent "500 Internal Server Error"
                const encodedUrl = encodeURIComponent(input.value);
                const response = await fetch(`https://tapi-e.vercel.app/download/${encodedUrl}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('title').innerText = data.title;
                    document.getElementById('duration').innerText = `Duration: ${data.duration_seconds}s`;

                    data.formats.forEach(f => {
                        const row = document.createElement('div');
                        row.className = "flex items-center justify-between p-3 rounded-xl bg-gray-800 border border-gray-700 hover:border-red-500 transition";
                        
                        const badgeColor = f.type === 'VIDEO' ? 'text-blue-400' : 'text-green-400';
                        const muteIcon = f.is_mute ? ' <i class="fas fa-volume-mute text-red-500 ml-1" title="No Audio"></i>' : '';

                        row.innerHTML = `
                            <div class="flex flex-col">
                                <span class="text-xs font-black ${badgeColor}">${f.type}</span>
                                <span class="font-bold text-sm">${f.quality} .${f.format.toLowerCase()}${muteIcon}</span>
                                <span class="text-[10px] text-gray-500">${f.size_mb} MB</span>
                            </div>
                            <a href="${f.direct_url}" target="_blank" class="bg-gray-700 hover:bg-red-600 p-2 px-4 rounded-lg text-xs font-bold transition">
                                DOWNLOAD
                            </a>
                        `;
                        formatGrid.appendChild(row);
                    });

                    resultCard.classList.remove('hidden');
                }
            } catch (err) {
                alert("Error connecting to server. Make sure main.py is running!");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
