<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimo TV Fixed Pop-up</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        .open-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #7442ff;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .modal {
            display: none; 
            position: fixed; 
            z-index: 999; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 850px;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 2px solid #7442ff; /* Player boundary */
        }

        .close-btn {
            position: absolute;
            top: -45px;
            right: 0;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff4500;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <button class="open-btn" onclick="openPlayer()">Open Stream</button>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <iframe id="nimoIframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const modal = document.getElementById('playerModal');
        const iframe = document.getElementById('nimoIframe');
        const videoUrl = "https://www.nimo.tv/embed/1913320824";

        function openPlayer() {
            modal.style.display = "flex";
            iframe.src = videoUrl;
        }

        function closePlayer() {
            modal.style.display = "none";
            iframe.src = "";
        }

        /* Background click fix: 
           Pehle yahan window.onclick wala code tha jo bahar click karne par band karta tha, 
           usey ab puri tarah hata diya gaya hai.
        */
    </script>

</body>
</html>
